name: Home Services Logbook
version: "1.0.0"
slug: home_services_logbook
description: A simple self-hosted web app for keeping a household service history in one place.
url: https://github.com/orionshock/home-services-logbook-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
ingress: true
ingress_port: 8000
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: Web interface
options:
  trust_upstream_auth: false
  allow_actor_override: true
schema:
  trust_upstream_auth: bool
  allow_actor_override: bool
map:
  - data:rw
