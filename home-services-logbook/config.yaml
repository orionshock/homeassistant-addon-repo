name: Home Services Logbook
version: "1.0.3"
slug: home_services_logbook
description: A simple self-hosted web app for keeping a household service history in one place.
url: https://github.com/orionshock/home-services-logbook-addon

arch:
  - aarch64
  - amd64

startup: application
boot: auto
ingress: true
ingress_port: 8000
ingress_stream: true
init: false
panel_icon: mdi:clipboard-text
panel_title: Home Services Logbook

options:
  allow_session_user_override: false
  data_dir: "/data"

schema:
  allow_session_user_override: bool
  data_dir: str?

map:
  - data:rw